# Place in /etc/nginx/sites-available/tusa.grangy.ru (or kaktusa)
# Enable: ln -sf /etc/nginx/sites-available/tusa.grangy.ru /etc/nginx/sites-enabled/
# SSL cert: /etc/letsencrypt/live/tusa.grangy.ru/ (certbot, domains: kaktusa.ru www.kaktusa.ru tusa.grangy.ru)

upstream kaktusa {
    server 127.0.0.1:3000;
    keepalive 64;
}

# HTTP — редирект на HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name kaktusa.ru www.kaktusa.ru tusa.grangy.ru;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        allow all;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name kaktusa.ru www.kaktusa.ru tusa.grangy.ru;

    ssl_certificate     /etc/letsencrypt/live/tusa.grangy.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tusa.grangy.ru/privkey.pem;

    location / {
        proxy_pass http://kaktusa;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
