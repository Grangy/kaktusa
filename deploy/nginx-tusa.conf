# Place in /etc/nginx/sites-available/tusa.grangy.ru (or kaktusa)
# Enable: ln -sf /etc/nginx/sites-available/tusa.grangy.ru /etc/nginx/sites-enabled/
# After SSL: certbot will add SSL config

upstream kaktusa {
    server 127.0.0.1:3000;
    keepalive 64;
}

server {
    listen 80;
    listen [::]:80;
    server_name kaktusa.ru www.kaktusa.ru tusa.grangy.ru;

    # For Let's Encrypt certificate verification
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        allow all;
    }

    location / {
        proxy_pass http://kaktusa;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
